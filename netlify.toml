# ═══════════════════════════════════════════════════════════════
# Netlify Config — مكتب تأشيرات السعودية | v4.0 | 2026-05-07
# أداء عالٍ + أمان + WebP + CDN + Brotli
# ═══════════════════════════════════════════════════════════════

[build]
 publish = "."
 command = "echo 'Static site - no build needed'"

[build.environment]
 NODE_VERSION = "20"
 NODE_ENV = "production"

# ⚡ تحسين CSS و JS تلقائياً
[build.processing]
 skip_processing = false

[build.processing.css]
 bundle = true
 minify = true

[build.processing.js]
 bundle = false
 minify = true

[build.processing.html]
 pretty_urls = false

[build.processing.images]
 compress = true

# ═══════════════════════════════════════════════════════════════
# 🔒 حماية ملفات حساسة
# ═══════════════════════════════════════════════════════════════
[[redirects]]
 from = "/.env*"
 to = "/404.html"
 status = 404
 force = true

[[redirects]]
 from = "/.git/*"
 to = "/404.html"
 status = 404
 force = true

[[redirects]]
 from = "/*.md"
 to = "/404.html"
 status = 404
 force = true

[[redirects]]
 from = "/*.py"
 to = "/404.html"
 status = 404
 force = true

[[redirects]]
 from = "/node_modules/*"
 to = "/404.html"
 status = 404
 force = true

# ═══════════════════════════════════════════════════════════════
# 🔁 Single-step redirects: HTTPS + Non-WWW (Task 5)
# يقلّص سلسلة التحويلات (http://www → https://www → https://) إلى قفزة واحدة
# ═══════════════════════════════════════════════════════════════
[[redirects]]
 from = "http://www.saudia-visa.com/*"
 to = "https://saudia-visa.com/:splat"
 status = 301
 force = true

[[redirects]]
 from = "http://saudia-visa.com/*"
 to = "https://saudia-visa.com/:splat"
 status = 301
 force = true

[[redirects]]
 from = "https://www.saudia-visa.com/*"
 to = "https://saudia-visa.com/:splat"
 status = 301
 force = true

