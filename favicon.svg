<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Transparent background — navy circle (matches new official emblem) -->
  <circle cx="256" cy="256" r="248" fill="#1B2A41"/>
  <!-- Palm tree (top) -->
  <g fill="#C9A35E">
    <ellipse cx="256" cy="160" rx="14" ry="70"/>
    <ellipse cx="256" cy="160" rx="14" ry="70" transform="rotate(45 256 160)"/>
    <ellipse cx="256" cy="160" rx="14" ry="70" transform="rotate(-45 256 160)"/>
    <ellipse cx="256" cy="160" rx="14" ry="70" transform="rotate(75 256 160)"/>
    <ellipse cx="256" cy="160" rx="14" ry="70" transform="rotate(-75 256 160)"/>
    <ellipse cx="256" cy="160" rx="14" ry="70" transform="rotate(90 256 160)"/>
    <!-- Trunk -->
    <rect x="246" y="200" width="20" height="120" rx="6"/>
  </g>
  <!-- Crossed swords (bottom) -->
  <g fill="#C9A35E" stroke="none">
    <!-- Sword 1: top-left to bottom-right -->
    <path d="M 100 290 L 410 410 L 405 425 L 95 305 Z"/>
    <!-- Sword 1 hilt -->
    <rect x="92" y="282" width="20" height="32" rx="3"/>
    <!-- Sword 2: top-right to bottom-left -->
    <path d="M 412 290 L 102 410 L 107 425 L 417 305 Z"/>
    <!-- Sword 2 hilt -->
    <rect x="400" y="282" width="20" height="32" rx="3"/>
  </g>
</svg>
